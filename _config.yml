
title: gloriously awkward life #Your awesome title
email: gloriouslyawkward@icloud.com #youremail@domain.com
description: > # this means to ignore newlines until "baseurl"
  Neurodivergent 50-something with Disney and data addictions.

baseurl: # the subpath of the site
url: http://gloriouslyawkwardlife.com # the base hostname & protocol for your site

permalink: /:year-:month/:title
timezone: America/New_York

favicon: /assets/img/favicon.ico

google_analytics: G-HVJEFT95WR #UA—XXXXXXXX-X
disqus_shortname: gloriouslyawkward #disqus shortname
cusdis:
    app_id: #your cusdis app_id

# user:
#   name: Steven Buehler
#   pic: /assets/img/cat.jpg
#   picAlt: "catbook"
#   aboutme: true # comment this out if you don't need the 'about' page.
#   job: a category-centric theme

exclude:
  - README.md
  - LICENSE
  - github

defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      comment: true   

markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown 

# Filtering Content
show_drafts: null
limit_posts: 0
future:      false
unpublished: false
